# Netlify runs Next.js 14 correctly only with the official runtime plugin.
# Without it, CSS/SSR chunks often fail and the site can render as unstyled HTML.
#
# If the .netlify.app URL ever redirects to a different hostname, check Netlify
# Domain management (primary domain / aliases) for that site.
#
# Netlify build env `URL` is the site's primary domain — do not use it for Open
# Graph in this app; see PORTAL_CANONICAL_URL in layout.tsx.

[build]
  command = "npm run build"

[[plugins]]
  package = "@netlify/plugin-nextjs"
